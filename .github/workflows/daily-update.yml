name: Daily Prediction Update

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate data
        run: npm run validate:data

      - name: Run daily update
        run: npm run daily:update

      - name: Check daily update health
        run: npm run daily:check

      - name: Commit updated prediction data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data_files/fixtures.json backend/data_files/raw-news.json
          git add -f backend/snapshots/*.json
          git diff --cached --quiet || git commit -m "chore: daily prediction update"
          git push
